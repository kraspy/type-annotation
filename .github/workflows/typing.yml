name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "mypy>=1.10" "ruff>=0.8"

      - name: Run type checks
        run: mypy challenges/

      - name: Run linter
        run: ruff check challenges/
